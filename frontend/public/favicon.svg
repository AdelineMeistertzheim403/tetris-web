<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#02050d" />
      <stop offset="45%" stop-color="#0a1730" />
      <stop offset="100%" stop-color="#15091f" />
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#1d4f82" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.42" />
    </radialGradient>
    <filter id="glow-strong" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.45" />
    </filter>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.34" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)" />
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#vignette)" />
  <rect x="5.5" y="5.5" width="53" height="53" rx="12.5" fill="none" stroke="#9ef0ff" stroke-opacity="0.28" />
  <path d="M10 9.5c8-4.5 36-4.5 44 0" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2" stroke-linecap="round" />

  <g transform="translate(10 9)" filter="url(#shadow)">
    <g filter="url(#glow-strong)">
      <g>
        <rect x="0" y="0" width="10" height="10" rx="2.2" fill="#31c8ff" />
        <rect x="11" y="0" width="10" height="10" rx="2.2" fill="#31c8ff" />
        <rect x="22" y="0" width="10" height="10" rx="2.2" fill="#31c8ff" />
        <rect x="22" y="11" width="10" height="10" rx="2.2" fill="#31c8ff" />
        <rect x="0" y="0" width="10" height="10" rx="2.2" fill="url(#shine)" />
        <rect x="11" y="0" width="10" height="10" rx="2.2" fill="url(#shine)" />
        <rect x="22" y="0" width="10" height="10" rx="2.2" fill="url(#shine)" />
        <rect x="22" y="11" width="10" height="10" rx="2.2" fill="url(#shine)" />
      </g>

      <g>
        <rect x="34" y="0" width="10" height="10" rx="2.2" fill="#ffe066" />
        <rect x="34" y="11" width="10" height="10" rx="2.2" fill="#ffe066" />
        <rect x="34" y="22" width="10" height="10" rx="2.2" fill="#ffe066" />
        <rect x="23" y="22" width="10" height="10" rx="2.2" fill="#ffe066" />
        <rect x="34" y="0" width="10" height="10" rx="2.2" fill="url(#shine)" />
        <rect x="34" y="11" width="10" height="10" rx="2.2" fill="url(#shine)" />
        <rect x="34" y="22" width="10" height="10" rx="2.2" fill="url(#shine)" />
        <rect x="23" y="22" width="10" height="10" rx="2.2" fill="url(#shine)" />
      </g>

      <g>
        <rect x="0" y="23" width="10" height="10" rx="2.2" fill="#c45cff" />
        <rect x="11" y="23" width="10" height="10" rx="2.2" fill="#c45cff" />
        <rect x="22" y="23" width="10" height="10" rx="2.2" fill="#c45cff" />
        <rect x="11" y="34" width="10" height="10" rx="2.2" fill="#c45cff" />
        <rect x="0" y="23" width="10" height="10" rx="2.2" fill="url(#shine)" />
        <rect x="11" y="23" width="10" height="10" rx="2.2" fill="url(#shine)" />
        <rect x="22" y="23" width="10" height="10" rx="2.2" fill="url(#shine)" />
        <rect x="11" y="34" width="10" height="10" rx="2.2" fill="url(#shine)" />
      </g>
    </g>

    <g fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="0.8">
      <rect x="0.5" y="0.5" width="9" height="9" rx="1.8" />
      <rect x="11.5" y="0.5" width="9" height="9" rx="1.8" />
      <rect x="22.5" y="0.5" width="9" height="9" rx="1.8" />
      <rect x="22.5" y="11.5" width="9" height="9" rx="1.8" />
      <rect x="34.5" y="0.5" width="9" height="9" rx="1.8" />
      <rect x="34.5" y="11.5" width="9" height="9" rx="1.8" />
      <rect x="34.5" y="22.5" width="9" height="9" rx="1.8" />
      <rect x="23.5" y="22.5" width="9" height="9" rx="1.8" />
      <rect x="0.5" y="23.5" width="9" height="9" rx="1.8" />
      <rect x="11.5" y="23.5" width="9" height="9" rx="1.8" />
      <rect x="22.5" y="23.5" width="9" height="9" rx="1.8" />
      <rect x="11.5" y="34.5" width="9" height="9" rx="1.8" />
    </g>
  </g>
</svg>
